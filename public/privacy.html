<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隱私權政策 - 貪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #16213e;
      padding: 40px 32px;
      border-radius: 16px;
      width: 600px;
      max-width: 90vw;
      color: #fff;
      margin: 40px 0;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 28px;
    }
    .updated {
      opacity: 0.5;
      font-size: 14px;
      margin: 0 0 24px;
    }
    section {
      margin-bottom: 20px;
    }
    h2 {
      font-size: 18px;
      margin: 0 0 8px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.85;
    }
    .btn {
      display: block;
      margin: 32px auto 0;
      padding: 12px 36px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      width: fit-content;
    }
    .btn:hover { background: #43a047; }

  <div class="card">

    <section>
      <h2>1. 收集的資料</h2>
      <p>本遊戲使用 Google 登入時，會取得您的 Google 顯示名稱和電子郵件地址。遊戲過程中的最高分數也會被記錄。</p>

      <p>您的名稱和分數僅用於顯示在排行榜上，供所有玩家查看。</p>
    </section>

    <section>
      <h2>3. 資料儲存</h2>
      <p>資料儲存於 Firebase 雲端服務，僅供排行榜功能使用。</p>
    </section>

    <section>
      <h2>4. 資料分享</h2>
      <p>我們不會將您的個人資料分享、販售或提供給任何第三方。</p>
    </section>

    <section>
      <h2>5. 資料刪除</h2>
      <p>如需刪除您的資料，請透過下方聯絡方式與我們聯繫。</p>
    </section>

    <section>
      <h2>6. 聯絡方式</h2>
      <p>如有任何隱私權相關問題，請聯絡：ielp210855@gmail.com</p>
    </section>

    <a class="btn" href="javascript:history.back()">返回</a>
