<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="google-site-verification" content="googlee68902c6401a1c4d" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>貪吃蛇 - 線上 Snake 遊戲</title>
    <meta name="description" content="貪吃蛇是一款經典的網頁遊戲，使用 Google 帳號登入即可遊玩，分數會記錄在排行榜上與朋友比拼。">
  </head>
  <body>
    <div id="app"></div>
    <div id="app-info">
      <p>🐍 貪吃蛇 - 經典 Snake 遊戲，使用 Google 帳號登入即可遊玩，分數會記錄在排行榜上與朋友比拼</p>
      <p><a href="https://flash666-87.github.io/Snack-game/privacy">隱私權政策</a></p>
    </div>
    <script>
      // Remove static info after Vue mounts so it doesn't duplicate the app UI
      var check = setInterval(function() {
        if (document.querySelector('#app > *')) {
          document.getElementById('app-info').style.display = 'none';
          clearInterval(check);
        }
      }, 100);
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
